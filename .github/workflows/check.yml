name: AI 가격 체크
on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 가격 체크 실행
        run: python3 build_data.py
        working-directory: scripts
      - name: 변경사항 커밋
        run: |
          git config user.name "AI Price Watcher"
          git config user.email "bot@aiwatcher.local"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "data.json 업데이트 $(date +%Y-%m-%d)"
          git push
